<html>
    <head>
        <script>
            if (navigator.serviceWorker) {
                navigator.serviceWorker.register('/src/js/sw.js').then(function(registration) {
                    console.log('service worker 注册成功');
                }).catch(function (err) {
                    console.log('servcie worker 注册失败');
                    console.log(err);
                });
            }else{
                console.log("浏览器不支持");
            }
        </script>
    </head>
