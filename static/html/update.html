<!DOCTYPE html>
<html lang="en">
    <head>
        <title>显示远程图片</title>
        <style>*{font-size: 1em;}</style>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <script>
            function show(){
                url=document.getElementById("url").value;
                copy=document.getElementById("copy");
                console.log(url);
                copy.insertAdjacentHTML("beforeend","<img src=\""+url+"\">"+"&nbsp;");
                copy.focus();
                document.execCommand("Copy");
            }
        </script>
    </head>
    <body>
        <div contenteditable="true" id="copy" >
        </div>
        <input type="text" id="url">
        <button onclick="show()">显示</button>
        <br>
        <img src="http://ww2.sinaimg.cn/large/0060lm7Tly1fjsabidiiej307s07sq2p.jpg" alt=""><br>
    </body>
</html>
